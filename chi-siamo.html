<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platò – Chi Siamo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --primary-blue: #00AEEF;
    --neon-green: #32CD32;
    --plato-orange: #FF8C00;
    --text-light: #ffffff;
}

body, html {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', sans-serif; background-color: #0d0d0d; overflow: hidden;
}

.hero {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #000 url('cassa_plato.png') no-repeat center center;
    background-size: cover;
    opacity: 0;
    animation: fadeInHero 0.8s ease-in forwards;
}

@keyframes fadeInHero { to { opacity: 1; } }

/* NAVIGAZIONE DESKTOP */
.nav-wrapper {
    position: absolute;
    top: 30px;
    right: 40px;
    z-index: 1000;
}

.top-nav {
    background: rgba(0, 0, 0, 0.4);
    padding: 12px 25px;
    border-radius: 50px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 25px;
}

.top-nav a {
    color: var(--plato-orange);
    text-decoration: none;
    text-transform: uppercase;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1.5px;
}

.piano-operativo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 250px;
    background: rgba(0,0,0,0.65);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(8px);
    color: white;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.piano-operativo h3 {
    margin: 0 0 20px 0;
    color: var(--neon-green);
    text-transform: uppercase;
    font-size: 22px;
}

.step {
    padding: 14px;
    margin-bottom: 12px;
    border: 1.5px solid var(--neon-green);
    border-radius: 10px;
    cursor: pointer;
    background: rgba(0,0,0,0.3);
    font-size: 12px;
    text-transform: uppercase;
    animation: pulseGlowAzzurro 3.5s infinite ease-in-out;
}

@keyframes pulseGlowAzzurro {
    0%, 100% { transform: scale(1); border-color: var(--neon-green); }
    50% { transform: scale(1.025); border-color: rgba(0, 238, 255, 0.8); box-shadow: 0 0 12px rgba(0, 174, 239, 0.3); }
}

.step:nth-child(2) { animation-delay: 0s; }
.step:nth-child(3) { animation-delay: 0.7s; }
.step:nth-child(4) { animation-delay: 1.4s; }
.step:nth-child(5) { animation-delay: 2.1s; }
.step:nth-child(6) { animation-delay: 2.8s; }

.popover {
    position: fixed;
    display: none;
    width: 260px;
    background: rgba(5, 202, 47, 0.95);
    padding: 18px;
    border-radius: 12px;
    border: 1px solid white;
    color: white;
    text-align: center;
    z-index: 1100;
}

.popover h4 { margin: 0 0 8px 0; font-weight: 900; text-shadow: 1px 1px 2px #000; }
.popover p { margin: 0; font-weight: 700; text-shadow: 1px 1px 1px #000; }

.audio-ctrl { cursor: pointer; display: flex; align-items: center; gap: 8px; border-left: 1px solid rgba(255,255,255,0.3); padding-left: 20px; }

.bottom-box {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    background: rgba(0,0,0,0.8);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    border: 1.5px solid var(--neon-green);
}

/* RESPONSIVE FISSARE AL CENTRO E PADDING PICCOLI */
@media (max-width: 768px) {
    .nav-wrapper { top: 15px; right: 0; left: 0; width: 100%; display: flex; justify-content: center; }
    .top-nav { gap: 12px; padding: 10px 15px; border-radius: 20px; width: 90%; justify-content: center; }
    .top-nav a { font-size: 8px; letter-spacing: 0.5px; }
    
    .piano-operativo { width: 35%; top: 60%; padding: 12px; }
    .piano-operativo h3 { font-size: 14px; margin-bottom: 10px; }

    .step {
        font-size: 9px;
        padding: 4px;
        margin-bottom: 5px;
        animation: pulseGlowAzzurro 3.5s infinite ease-in-out !important;
    }

    .popover { left: 50% !important; transform: translateX(-50%) !important; top: 30% !important; width: 50%; }
    .bottom-box { width: 85%; bottom: 10%; }
}
</style>
</head>
<body>
<div class="hero">
    <div class="nav-wrapper">
        <nav class="top-nav">
            <a href="index.html">Home</a>
            <a href="chi-siamo.html" style="color:white">Chi Siamo</a>
            <a href="clienti.html">Clienti</a>
            <a href="contatti.html">Contatti</a>
            <div class="audio-ctrl" id="audioToggle">
                <svg id="iconOn" width="20" height="20" viewBox="0 0 24 24" fill="#ffffff"><path d="M3 9V15H7L12 20V4L7 9H3Z"/><path d="M16.5 12C16.5 10.23 15.46 8.71 14 7.97V16.03C15.46 15.29 16.5 13.77 16.5 12Z"/><path d="M14 3.23V5.29C17.39 6.15 20 8.83 20 12C20 15.17 17.39 17.85 14 18.71V20.77C18.45 19.86 22 16.28 22 12C22 7.72 18.45 4.14 14 3.23Z"/></svg>
                <svg id="iconOff" width="20" height="20" viewBox="0 0 24 24" fill="#ffffff" style="display:none;"><path d="M3 9V15H7L12 20V4L7 9H3Z"/><path d="M16 8L20 12L16 16" stroke="#ffffff" stroke-width="2" fill="none"/></svg>
            </div>
        </nav>
    </div>
    <div class="piano-operativo">
        <h3>Piano Operativo</h3>
        <div class="step" data-title="Analisi Dati" data-text="Studio e valutazione di costi sostenuti negli ultimi due mesi.">1. Analisi Dati</div>
        <div class="step" data-title="Benchmarking" data-text="Confronto dei costi con i nostri listini per identificare le aree di miglioramento.">2. Benchmarking</div>
        <div class="step" data-title="Presentazione risparmio" data-text="Presentazione del valore stimato del risparmio.">3. Presentazione risparmio</div>
        <div class="step" data-title="Disintermediazione" data-text="Proposta di cambio di modello di acquisto.<br>Qualità uguale o superiore.">4. Disintermediazione</div>
        <div class="step" data-title="Monitoraggio SaaS" data-text="Assistenza continuativa e monitoraggio nel tempo.">5. Monitoraggio SaaS</div>
    </div>
    <div id="popover" class="popover"></div>
    <div class="bottom-box">
        <h4>Offre Platò</h4>
        <p>Il servizio è totalmente gratuito. Nessuna commissione richiesta.</p>
    </div>
</div>
<audio id="bgAudio" src="restaurant.mp3" autoplay loop></audio>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const pop = document.getElementById('popover');
    const steps = document.querySelectorAll('.step');
    steps.forEach(step => {
        step.addEventListener('click', (e) => {
            pop.innerHTML = `<h4>${step.dataset.title}</h4><p>${step.dataset.text}</p>`;
            pop.style.display = 'block';
            if(window.innerWidth > 768) {
                const rect = step.getBoundingClientRect();
                pop.style.top = (rect.top) + 'px';
                pop.style.left = (rect.right + 20) + 'px';
            }
            clearTimeout(pop._timer);
            pop._timer = setTimeout(() => { pop.style.display = 'none'; }, 4500);
        });
    });
    const audio = document.getElementById('bgAudio');
    const toggle = document.getElementById('audioToggle');
    audio.volume = 0.25;
    let playing = true;
    toggle.addEventListener('click', () => {
        if (playing) { audio.pause(); document.getElementById('iconOn').style.display="none"; document.getElementById('iconOff').style.display="block"; }
        else { audio.play(); document.getElementById('iconOff').style.display="none"; document.getElementById('iconOn').style.display="block"; }
        playing = !playing;
    });
});
</script>
</body>
</html>
